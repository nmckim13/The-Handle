<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YardKartz — Big Screen</title>
<link rel="icon" href="/logo.png">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E0231C; --yellow: #F4E40F; --white: #ffffff;
    --text2: #9a9a9a; --line: #2a2a2a; --bg: #0a0a0a; --panel: #141414; --panel-2: #1c1c1c;
    --green: #2D8B45;
  }
  html, body { background: var(--bg); color: var(--white); font-family: 'Archivo', sans-serif; height: 100%; overflow: hidden; }
  .kiosk { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

  .board { padding: 24px 20px; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 14px; }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 52px; width: auto; }
  .brand-name { font-size: 26px; font-weight: 900; color: var(--yellow); letter-spacing: 1px; }
  .brand-sub { font-size: 15px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; }

  .flag-banner { display: none; border-radius: 14px; padding: 18px 24px; text-align: center; font-size: 40px; font-weight: 900; letter-spacing: 1px; }
  .flag-banner.show { display: block; }

  .stage-card { background: var(--panel); border: 2px solid var(--red); border-radius: 14px; padding: 20px 26px; }
  .stage-title { font-size: 34px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
  .stage-title .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .stage-meta { font-size: 20px; font-weight: 700; color: var(--text2); margin-top: 6px; }
  .lap-line { font-size: 28px; font-weight: 900; margin-top: 10px; color: var(--yellow); }

  .leaderboard-wrap { flex: 1; overflow-y: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 8px 0; }
  table.board-tbl { width: 100%; border-collapse: collapse; }
  table.board-tbl th { font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); text-align: left; padding: 10px 24px; border-bottom: 1px solid var(--line); }
  table.board-tbl td { font-size: 28px; font-weight: 800; padding: 12px 24px; border-bottom: 1px solid var(--line); }
  table.board-tbl tr:last-child td { border-bottom: none; }
  table.board-tbl td.pos { color: var(--yellow); width: 70px; }
  table.board-tbl td.num { width: 92px; padding-right: 4px; }
  table.board-tbl td.num img.dg-num-img { height: 46px; }
  .still-racing { font-size: 18px; font-weight: 700; color: var(--text2); padding: 16px 24px; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 26px; font-weight: 800; color: var(--text2); text-align: center; padding: 40px; }

  /* Qualifying list — one flat rank-ordered list, group badge + time per row. */
  .grid-head { font-size: 15px; text-transform: uppercase; letter-spacing: 2px; color: var(--yellow); font-weight: 900; padding: 12px 24px 6px; }
  .grid-list { display: flex; flex-direction: column; }
  .grid-row { display: grid; grid-template-columns: 50px 40px 96px 1fr auto; align-items: center; gap: 14px; padding: 9px 24px; border-bottom: 1px solid var(--line); }
  .grid-row:last-child { border-bottom: none; }
  .grid-row .gr-pos { font-size: 30px; font-weight: 900; color: var(--yellow); text-align: center; }
  .grid-row .gr-badge { font-size: 15px; font-weight: 900; color: var(--bg); background: var(--yellow); border-radius: 6px; padding: 3px 0; text-align: center; }
  .grid-row .gr-num { display: flex; align-items: center; justify-content: center; }
  .grid-row .gr-num img.dg-num-img { height: 52px; }
  .grid-row .gr-name { font-size: 27px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grid-row .gr-time { font-size: 22px; font-weight: 800; color: var(--text2); font-variant-numeric: tabular-nums; }

  /* Starting grid — 2-wide paired rows (row N = two slots side by side) so
     drivers can see which row they start in and who's beside them. Shared by
     each heat card's pre-results view and the feature's pre-results view;
     grid-auto-flow's default row-major fill pairs starting_position 1&2,
     3&4, etc. automatically as long as the lineup is sorted ascending. */
  .start-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
  .sg-slot { display: flex; align-items: center; gap: 10px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; }
  .sg-pos { font-size: 22px; font-weight: 900; color: var(--yellow); width: 26px; text-align: center; }
  .sg-num { display: flex; align-items: center; justify-content: center; }
  .sg-name { font-size: 18px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .start-grid.compact { gap: 6px; padding: 4px 10px 8px; }
  .start-grid.compact .sg-slot { padding: 5px 7px; gap: 6px; }
  .start-grid.compact .sg-pos { font-size: 16px; width: 18px; }
  .start-grid.compact .sg-name { font-size: 13px; }

  /* All-heats board — every heat on screen at once during heat racing, so each
     driver can find their heat and get ready; results fill in live. */
  .heats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; padding: 12px; align-content: start; }
  .heat-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .heat-card.live { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); }
  .heat-card-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .heat-card-title { font-size: 22px; font-weight: 900; }
  .heat-card-badge { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .heat-card-sub { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); padding: 7px 16px 3px; }
  .hc-row { display: grid; grid-template-columns: 34px 52px 1fr auto; align-items: center; gap: 10px; padding: 6px 16px; border-bottom: 1px solid var(--line); }
  .hc-row:last-child { border-bottom: none; }
  .hc-row.out { opacity: 0.5; }
  .hc-pos { font-size: 21px; font-weight: 900; color: var(--yellow); text-align: center; }
  .hc-num { display: flex; align-items: center; justify-content: center; }
  .hc-num img.dg-num-img { height: 34px; width: auto; }
  .hc-name { font-size: 20px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hc-lap { font-size: 14px; font-weight: 700; color: var(--text2); }

</style>
</head>
<body>

<div class="kiosk">
  <div class="board">
    <div class="brand">
      <img src="logo.png" alt="YardKartz">
      <div>
        <div class="brand-name">YardKartz</div>
        <div class="brand-sub">The Handle — Race Night</div>
      </div>
    </div>

    <div class="flag-banner" id="flag-banner"></div>

    <div class="stage-card" id="stage-card">
      <div class="stage-title"><span class="dot"></span><span id="stage-title-text">Loading…</span></div>
      <div class="stage-meta" id="stage-meta"></div>
      <div class="lap-line" id="lap-line"></div>
    </div>

    <div class="leaderboard-wrap" id="leaderboard-wrap">
      <div class="empty-state">Waiting for race night to go live…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/race-night-client.js"></script>
<script src="/driver-graphics.js"></script>
<script>
const SURL = 'https://lnsvacnbgmklpkgzbodb.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxuc3ZhY25iZ21rbHBrZ3pib2RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjIyOTMsImV4cCI6MjA5MzU5ODI5M30.GOCPHaUwg-L6rk8mAuRGjC3ggvJQZ98N6IqnsNJxalY';

const { FLAG_LABEL, STAGE_LABEL, sessionLabel, debounce, escapeHtml } = window.RaceNight;
const get = window.RaceNight.createClient(SURL, SKEY).get;

// QUALIFYING — one flat list of every checked-in driver, ranked by best
// qualifying time (synced live onto live_state.qual_times as the admin
// enters laps — untimed drivers sit at the bottom in car-number order). If
// qualifying groups have been drawn (live_state.qual_groups), each row also
// gets a small group-letter badge, but the list itself stays unsplit so the
// order always reflects who's actually fastest across the whole field.
function qualifyingListHtml(entries, qg, qualTimes){
  const numG = (e, size) => window.DriverGraphics.numHtml(e && e.name, e && e.car_number, size);
  const times = qualTimes || {};
  const groupCount = qg && qg.count ? Math.max(1, Math.min(4, qg.count)) : 1;
  const drawn = !!(qg && qg.byEntry && Object.keys(qg.byEntry).length > 0);
  const letter = i => String.fromCharCode(65 + i);
  const ranked = entries.slice().sort((a, b) => {
    const ta = times[a.id] == null ? Infinity : Number(times[a.id]);
    const tb = times[b.id] == null ? Infinity : Number(times[b.id]);
    if(ta !== tb) return ta - tb;
    return byCarNumber(a, b);
  });
  return `<div class="grid-head">Qualifying — ${entries.length} Kart${entries.length !== 1 ? 's' : ''}</div>
    <div class="grid-list">
      ${ranked.map((e, i) => {
        const gi = drawn && groupCount > 1 ? qg.byEntry[e.id] : null;
        const badge = (gi != null && gi < groupCount) ? `<div class="gr-badge">${letter(gi)}</div>` : '<div></div>';
        const t = times[e.id];
        return `<div class="grid-row">
          <div class="gr-pos">${i + 1}</div>
          ${badge}
          <div class="gr-num">${numG(e, 52)}</div>
          <div class="gr-name" style="color:${e.color || '#fff'}">${escapeHtml(e.name)}</div>
          <div class="gr-time">${t != null ? Number(t).toFixed(3) + 's' : '—'}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// Shared 2-wide paired starting-grid: CSS grid's default row-major fill lays
// out an ascending-starting_position lineup as P1|P2 on row 1, P3|P4 on row
// 2, etc., so drivers can see which row they start in and who's beside them.
// compact=true sizes it down for use inside the narrow per-heat cards.
function startingGridHtml(lineup, opts){
  const compact = !!(opts && opts.compact);
  const size = compact ? 20 : 40;
  const numG = (e, s) => window.DriverGraphics.numHtml(e && e.name, e && e.car_number, s);
  if(!lineup.length) return '<div class="empty-state" style="padding:16px">Lineup coming up…</div>';
  return `<div class="start-grid${compact ? ' compact' : ''}">
    ${lineup.map(l => `<div class="sg-slot">
      <div class="sg-pos">${l.starting_position}</div>
      <div class="sg-num">${numG(l.entries, size)}</div>
      <div class="sg-name" style="color:${l.entries?.color || '#fff'}">${escapeHtml(l.entries?.name || '—')}</div>
    </div>`).join('')}
  </div>`;
}

// Sorts by car number numerically where possible (mirrors the admin's
// rnByCarNumber) so "10" doesn't sort before "2".
function byCarNumber(a, b){
  const na = parseInt(a.car_number, 10), nb = parseInt(b.car_number, 10);
  const aNum = !isNaN(na), bNum = !isNaN(nb);
  if(aNum && bNum && na !== nb) return na - nb;
  if(aNum && !bNum) return -1;
  if(!aNum && bNum) return 1;
  return String(a.car_number).localeCompare(String(b.car_number));
}

// One heat's card for the all-heats board: numbered starting grid, flipping to
// finishing order (with the yet-to-finish karts greyed) as results come in.
function heatCardHtml(s, lineup, results){
  const numG = (e, size) => window.DriverGraphics.numHtml(e && e.name, e && e.car_number, size);
  const done = s.status === 'completed';
  const live = s.status === 'in_progress' || (results.length > 0 && !done);
  const badge = done ? '<span style="color:var(--green)">✓ FINAL</span>'
    : live ? '<span style="color:var(--red)">● LIVE</span>'
    : '<span style="color:var(--text2)">UP NEXT</span>';
  const finishedIds = new Set(results.map(r => r.entry_id));
  const stillOut = lineup.filter(l => !finishedIds.has(l.entry_id));

  // No results yet — the card IS the starting grid: paired 2-wide rows so
  // drivers can see which row they start in and who's beside them.
  if(!results.length){
    return `<div class="heat-card${live ? ' live' : ''}">
      <div class="heat-card-head"><div class="heat-card-title">Heat ${s.session_number}</div><div class="heat-card-badge">${badge}</div></div>
      <div class="heat-card-sub">Start · ${lineup.length} karts</div>
      ${startingGridHtml(lineup, { compact: true })}
    </div>`;
  }

  // Results coming in — flip to a ranked finish list (still-out karts
  // greyed below the finishers). Finishing order isn't a physical grid, so
  // this stays a single column, same as before.
  const finRows = results.slice().sort((a, b) => a.finishing_position - b.finishing_position).map(r =>
    `<div class="hc-row"><div class="hc-pos">${r.finishing_position}</div><div class="hc-num">${numG(r.entries, 34)}</div><div class="hc-name" style="color:${r.entries?.color || '#fff'}">${escapeHtml(r.entries?.name || '—')}</div><div class="hc-lap">${r.best_lap_seconds != null ? Number(r.best_lap_seconds).toFixed(3) + 's' : ''}</div></div>`).join('');
  const outRows = stillOut.map(l =>
    `<div class="hc-row out"><div class="hc-pos">—</div><div class="hc-num">${numG(l.entries, 34)}</div><div class="hc-name" style="color:${l.entries?.color || '#fff'}">${escapeHtml(l.entries?.name || '—')}</div><div class="hc-lap"></div></div>`).join('');
  return `<div class="heat-card${live ? ' live' : ''}">
    <div class="heat-card-head"><div class="heat-card-title">Heat ${s.session_number}</div><div class="heat-card-badge">${badge}</div></div>
    <div class="heat-card-sub">Finish · ${lineup.length} karts</div>
    ${finRows}${outRows}
  </div>`;
}

async function refresh(){
  const stageCard = document.getElementById('stage-card');
  const titleEl = document.getElementById('stage-title-text');
  const metaEl = document.getElementById('stage-meta');
  const lapEl = document.getElementById('lap-line');
  const boardWrap = document.getElementById('leaderboard-wrap');
  const flagEl = document.getElementById('flag-banner');

  const rows = await get('live_state', 'select=*&is_live=eq.true&limit=1');
  const state = rows[0];
  if(!state){
    titleEl.textContent = 'Not Live Right Now';
    metaEl.textContent = 'Check back on race night';
    lapEl.textContent = '';
    flagEl.className = 'flag-banner';
    boardWrap.innerHTML = '<div class="empty-state">Waiting for race night to go live…</div>';
    return;
  }

  const races = await get('races', `select=*&id=eq.${state.race_id}`);
  const race = races[0];
  // Fetch every session for the race and follow the one that's actually active
  // (in progress, else being scored, else next up). live_state.session_id sticks
  // on the first heat all through heat racing, so it can't be trusted to point at
  // what's on track — this lets the kiosk advance heat to heat on its own as the
  // manager scores each one.
  const STAGE_ORDER = { heat: 0, b_main: 1, feature: 2 };
  const allSessions = (await get('race_sessions', `select=*&race_id=eq.${state.race_id}`))
    .sort((a, b) => (STAGE_ORDER[a.session_type] - STAGE_ORDER[b.session_type]) || (a.session_number - b.session_number));
  // Pull every session's lineup + results in one shot so the board can show all
  // heats at once (and so results appear the instant they're entered).
  const lineupsBy = {}, resultsBy = {};
  allSessions.forEach(s => { lineupsBy[s.id] = []; resultsBy[s.id] = []; });
  if(allSessions.length){
    const ids = allSessions.map(s => s.id).join(',');
    const [lus, res] = await Promise.all([
      get('lineups', `select=*,entries(name,car_number,color)&session_id=in.(${ids})&order=starting_position.asc`),
      get('session_results', `select=*,entries(name,car_number,color)&session_id=in.(${ids})&order=finishing_position.asc`)
    ]);
    lus.forEach(l => lineupsBy[l.session_id] && lineupsBy[l.session_id].push(l));
    res.forEach(r => resultsBy[r.session_id] && resultsBy[r.session_id].push(r));
  }
  // The active session drives the header/flag/lap. live_state.session_id sticks
  // on the first heat all through heat racing, so derive it from real state:
  // in progress, else being scored, else next up.
  const hasRes = s => (resultsBy[s.id] || []).length > 0;
  const session = allSessions.find(s => s.status === 'in_progress')
    || allSessions.find(s => hasRes(s) && s.status !== 'completed')
    || allSessions.find(s => s.status !== 'completed')
    || allSessions[allSessions.length - 1] || null;
  const lineup = session ? (lineupsBy[session.id] || []) : [];
  const results = session ? (resultsBy[session.id] || []) : [];

  const qualDrawn = !!(state.qual_groups && state.qual_groups.byEntry && Object.keys(state.qual_groups.byEntry).length > 0);
  const stageLabel = (!allSessions.length && qualDrawn) ? 'Qualifying' : (STAGE_LABEL[state.current_stage] || state.current_stage);
  const stageSessionLabel = sessionLabel(session);
  titleEl.textContent = `LIVE — ${stageLabel}${stageSessionLabel ? ' — ' + stageSessionLabel : ''}`;
  metaEl.textContent = race ? `R${race.round} — ${race.name}` : '';
  lapEl.textContent = (session && session.laps_scheduled) ? `LAP ${session.current_lap || 0} / ${session.laps_scheduled}` : '';

  const flag = session && session.flag_state !== 'green' ? FLAG_LABEL[session.flag_state] : null;
  if(flag){
    flagEl.className = 'flag-banner show';
    flagEl.style.background = flag.bg; flagEl.style.color = flag.fg;
    flagEl.textContent = `${flag.emoji} ${flag.label}`;
  } else {
    flagEl.className = 'flag-banner';
  }

  const numG = (e, size) => window.DriverGraphics.numHtml(e?.name, e?.car_number, size);

  if(!allSessions.length){
    const entries = (await get('entries', `select=*&race_id=eq.${state.race_id}&status=eq.checked_in`)).sort(byCarNumber);
    boardWrap.innerHTML = entries.length
      ? qualifyingListHtml(entries, state.qual_groups, state.qual_times)
      : '<div class="empty-state">Waiting for drivers to check in…</div>';
    return;
  }

  // HEAT STAGE — show every heat on screen at once so each driver can find their
  // heat and get ready. Results fill in live as the manager scores each one.
  const heats = allSessions.filter(s => s.session_type === 'heat');
  if(session && session.session_type === 'heat' && heats.length){
    boardWrap.innerHTML = `<div class="heats-grid">
      ${heats.map(h => heatCardHtml(h, lineupsBy[h.id] || [], resultsBy[h.id] || [])).join('')}
    </div>`;
    return;
  }

  // B-MAIN / FEATURE — the main event gets the full-width spotlight.
  const finishedIds = new Set(results.map(r => r.entry_id));
  const stillRacing = lineup.filter(l => !finishedIds.has(l.entry_id));

  if(!results.length && !stillRacing.length){
    boardWrap.innerHTML = '<div class="empty-state">Lineup coming up…</div>';
    return;
  }

  // Before anyone has finished, the board IS the starting grid — paired 2-wide
  // rows so each driver sees exactly which row they line up in and who's
  // starting beside them.
  if(!results.length){
    boardWrap.innerHTML = `
      <div class="grid-head">Starting Lineup${stageSessionLabel ? ' — ' + escapeHtml(stageSessionLabel) : ''}</div>
      ${startingGridHtml(lineup, { compact: false })}`;
    return;
  }

  boardWrap.innerHTML = `
    <table class="board-tbl"><thead><tr><th>Pos</th><th>No.</th><th>Driver</th><th>Best Lap</th></tr></thead><tbody>
      ${results.map(r => `<tr><td class="pos">${r.finishing_position}</td><td class="num">${numG(r.entries, 44)}</td><td style="color:${r.entries?.color || '#fff'}">${escapeHtml(r.entries?.name || '—')}</td><td>${r.best_lap_seconds != null ? Number(r.best_lap_seconds).toFixed(3) + 's' : '—'}</td></tr>`).join('')}
    </tbody></table>
    ${stillRacing.length ? `<div class="still-racing">Still racing: ${stillRacing.map(l => '#' + escapeHtml(l.entries?.car_number || '?') + ' ' + escapeHtml(l.entries?.name || '—')).join(' · ')}</div>` : ''}
  `;
}

let _channel = null;
function ensureRealtime(){
  if(_channel || typeof window.supabase === 'undefined') return;
  const sb = window.supabase.createClient(SURL, SKEY);
  const debouncedRefresh = debounce(refresh, 400);
  _channel = sb.channel('race-night-big-screen')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'live_state' }, debouncedRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'session_results' }, debouncedRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'race_sessions' }, debouncedRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, debouncedRefresh)
    .subscribe();
}

refresh();
ensureRealtime();
setInterval(refresh, 15000); // safety-net poll in case the socket drops on an unattended kiosk
</script>
</body>
</html>
